name: "Configure Proxygen"
description: "Configure the credentials and settings needed to access the proxygen account"
runs:
  using: "composite"
  steps:
    - name: "Get proxygen machine user details"
      id: "proxygen-machine-user"
      uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802
      with:
        secret-ids: /cds/pathology/dev/proxygen/proxygen-key-secret
        name-transformation: lowercase
    - name: "Apply proxygen details"
      working-directory: "proxygen"
      shell: bash
      run: |
        echo "Setting up proxygen configuration..."
        mkdir -p $HOME/.proxygen
        cp settings.yaml $HOME/.proxygen/settings.yaml
        echo "Settings copied to $HOME/.proxygen/settings.yaml"

        printf "%s" "$_cds_pathology_dev_proxygen_proxygen_key_secret" > /tmp/proxygen_private_key.pem
        echo "Private key written to /tmp/proxygen_private_key.pem"

        cp credentials.template.yaml $HOME/.proxygen/credentials.yaml
        yq eval '.private_key_path = "/tmp/proxygen_private_key.pem"' -i $HOME/.proxygen/credentials.yaml
        echo "Credentials configured"

        echo "Proxygen configuration files:"
        ls -la $HOME/.proxygen/
