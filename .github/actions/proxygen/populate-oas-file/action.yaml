name: "Populate OAS file"
description: "Install yq and populate the OAS template file"
inputs:
  mtls-secret-key:
    description: "MTLS secret key for API proxy"
    required: true
  preview-url:
    description: "Preview URL for the deployed Lambda"
    required: true
runs:
  using: "composite"
  steps:
    - name: "Install yq for YAML template processing"
      shell: bash
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
    - name: "Inject secrets into openapi.yaml for deploying proxy"
      working-directory: "pathology-api"
      shell: bash
      env:
        MTLS_SECRET_KEY: ${{ inputs.mtls-secret-key }}
        PREVIEW_URL: ${{ inputs.preview-url }}
      run: |
        cp openapi.template.yaml openapi.yaml
        yq eval '.x-nhsd-apim.target.url = env(PREVIEW_URL) | .x-nhsd-apim.target.security.secret = env(MTLS_SECRET_KEY)' -i openapi.yaml
