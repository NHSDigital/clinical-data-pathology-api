name: "Populate OAS file"
description: "Install yq and populate the OAS template file"
inputs:
  mtls-secret-key:
    description: "MTLS secret key for API proxy"
    required: true
  preview-url:
    description: "Preview URL for the deployed Lambda"
    required: true
runs:
  using: "composite"
  steps:
    - name: "Install yq for YAML template processing"
      shell: bash
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
    - name: "Inject secrets into openapi.yaml for deploying proxy"
      working-directory: "pathology-api"
      shell: bash
      run: |
        echo "Current directory: $(pwd)"
        echo "Copying template..."
        cp openapi.template.yaml openapi.yaml
        echo "Injecting preview URL: ${{ inputs.preview-url }}"
        yq eval '.x-nhsd-apim.target.url = "${{ inputs.preview-url }}"' -i openapi.yaml
        echo "Injecting MTLS secret..."
        yq eval '.x-nhsd-apim.target.security.secret = "${{ inputs.mtls-secret-key }}"' -i openapi.yaml
        echo "openapi.yaml created successfully at $(pwd)/openapi.yaml"
        ls -la openapi.yaml
